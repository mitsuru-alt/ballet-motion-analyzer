services:
  - type: web
    name: ballet-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
